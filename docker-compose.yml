services:
  otp-server:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - otp_data:/data
    environment:
      # Generate a strong random secret: openssl rand -hex 32
      JWT_SECRET: "change-me-to-a-strong-random-secret"
      # Set these to create the first user on first start.
      # Remove or leave blank after first start.
      INITIAL_EMAIL: "your@email.com"
      INITIAL_PASSWORD: "change-me"
      DB_PATH: "/data/otp.db"
      PORT: "8080"

volumes:
  otp_data:
